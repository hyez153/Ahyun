<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dunamis App</title>
</head>
<body>

  <h2>데이터 입력</h2>

  <input id="nameInput" placeholder="이름 입력">
  <button onclick="saveData()">저장</button>

  <h3>📋 저장된 데이터</h3>
  <ul id="dataList"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAafW9AhyxQFobApD9vKQARJ4lKmg7d8kI",
      authDomain: "dunamis-153.firebaseapp.com",
      projectId: "dunamis-153",
      storageBucket: "dunamis-153.firebasestorage.app",
      messagingSenderId: "884867380831",
      appId: "1:884867380831:web:d3323eb4ecc397324e8dea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ✅ 저장 함수 (누적)
    window.saveData = function () {
      const name = document.getElementById("nameInput").value;

      if (!name) {
        alert("이름 입력해줘!");
        return;
      }

      push(ref(db, 'test'), {
        name: name,
        time: new Date().toString()
      });

      document.getElementById("nameInput").value = "";
    };

    // ✅ 데이터 불러와서 화면에 표시
    const dataList = document.getElementById("dataList");

    onValue(ref(db, 'test'), (snapshot) => {
      dataList.innerHTML = ""; // 초기화

      const data = snapshot.val();

      if (data) {
        Object.values(data).forEach(item => {
          const li = document.createElement("li");
          li.textContent = `${item.name} (${item.time})`;
          dataList.appendChild(li);
        });
      }
    });

  </script>

</body>
</html>
